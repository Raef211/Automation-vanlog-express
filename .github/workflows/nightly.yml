name: 🌙 Nightly Smoke Tests

on:
  schedule:
    # Runs every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

env:
  HEADLESS: true
  SLOWMO_MS: '0'
  BASE_URL: ${{ secrets.BASE_URL || 'https://vanlog-express.com' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ALLURE_RESULTS_DIR: allure-results

jobs:
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    container:
      image: ${{ vars.DOCKERHUB_USERNAME }}/automatisation-pom:latest
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install dependencies
        timeout-minutes: 5
        run: npm install --legacy-peer-deps

      - name: 🌐 Wait for app to be ready (optional)
        timeout-minutes: 2
        run: |
          for i in {1..30}; do
            if curl -f https://vanlog-express.com 2>/dev/null; then
              echo "✅ App is ready"
              break
            fi
            echo "⏳ Waiting for app... ($i/30)"
            sleep 2
          done || echo "⚠️ App not accessible, continuing anyway"

      - name: 🧹 Clean allure-results
        run: rm -rf allure-results && mkdir -p allure-results

      - name: 🧪 Run Smoke Tests (@smoke)
        timeout-minutes: 20
        run: npm run test:headless -- --tags "@smoke" || true

      - name: 📥 Restore Allure history from previous run
        if: always()
        timeout-minutes: 2
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          BASE="https://${OWNER}.github.io/${REPO}/nightly/history"
          mkdir -p allure-results/history
          for f in categories-trend duration-trend history-trend history retry-trend; do
            curl -sf "${BASE}/${f}.json" -o "allure-results/history/${f}.json" 2>/dev/null \
              && echo "✅ history/${f}.json restored" || true
          done
        continue-on-error: true

      - name: 🔍 Debug allure-results
        if: always()
        run: |
          echo "📂 allure-results contents:"
          ls -la allure-results/ 2>/dev/null || echo "(directory empty or missing)"
          RESULT_COUNT=$(find allure-results -maxdepth 1 -name '*-result.json' 2>/dev/null | wc -l)
          CONTAINER_COUNT=$(find allure-results -maxdepth 1 -name '*-container.json' 2>/dev/null | wc -l)
          echo "Result files: ${RESULT_COUNT}"
          echo "Container files: ${CONTAINER_COUNT}"
          if [ "$RESULT_COUNT" -gt "0" ]; then
            echo "📄 Sample result file:"
            find allure-results -maxdepth 1 -name '*-result.json' | head -1 | xargs cat 2>/dev/null | head -30
          else
            echo "⚠️ No result files found — allure-cucumberjs formatter did not write results"
            echo "Checking if allure-cucumberjs is loaded:"
            cat node_modules/allure-cucumberjs/package.json | grep '"version"' || echo "allure-cucumberjs not found"
          fi

      - name: 📊 Generate Allure Report
        id: allure_generate
        if: always()
        timeout-minutes: 3
        run: |
          COUNT=$(find allure-results -maxdepth 1 -name '*-result.json' 2>/dev/null | wc -l)
          echo "Found ${COUNT} result file(s)"
          if [ "$COUNT" -gt "0" ]; then
            npx allure generate allure-results --clean -o allure-report
            echo "✅ Allure report generated with ${COUNT} results"
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No allure result files — tests may have crashed before producing results"
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Add local viewing scripts to report
        if: always() && steps.allure_generate.outputs.has_results == 'true'
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          PAGES_URL="https://${OWNER}.github.io/${REPO}/nightly/"

          # Windows batch script
          cat > allure-report/view-report.bat << 'BATCH'
          @echo off
          echo =============================================
          echo  Allure Report - Visualisation locale
          echo =============================================
          echo.
          echo Ce rapport necessite un serveur HTTP.
          echo Demarrage en cours...
          echo.
          echo Ouvrez votre navigateur sur : http://localhost:8080
          echo Appuyez sur Ctrl+C pour arreter.
          echo.
          where python >nul 2>&1 && (python -m http.server 8080) || (npx http-server -p 8080 --cors)
          BATCH

          # Linux/Mac shell script
          cat > allure-report/view-report.sh << SHELL
          #!/bin/bash
          echo "============================================="
          echo " Allure Report - Visualisation locale"
          echo "============================================="
          echo ""
          echo "Ouvrez votre navigateur sur : http://localhost:8080"
          echo "Appuyez sur Ctrl+C pour arreter."
          echo ""
          if command -v python3 &>/dev/null; then
            python3 -m http.server 8080
          elif command -v python &>/dev/null; then
            python -m http.server 8080
          else
            npx http-server -p 8080 --cors
          fi
          SHELL
          chmod +x allure-report/view-report.sh

          # README
          cat > allure-report/LISEZ-MOI.txt << README
          =============================================
           RAPPORT ALLURE - Comment visualiser
          =============================================

          Ce rapport NE peut PAS être ouvert directement
          en double-cliquant sur index.html (erreur 500).
          Il nécessite un serveur HTTP.

          --- OPTION 1 : GitHub Pages (recommandé) ---
          Accédez directement à l'URL :
          ${PAGES_URL}

          --- OPTION 2 : En local (Windows) ---
          Double-cliquez sur : view-report.bat
          Puis ouvrez : http://localhost:8080

          --- OPTION 3 : En local (Linux/Mac) ---
          chmod +x view-report.sh && ./view-report.sh
          Puis ouvrez : http://localhost:8080

          README

      - name: 📊 Upload Allure Report
        if: always() && steps.allure_generate.outputs.has_results == 'true'
        timeout-minutes: 5
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-nightly
          path: allure-report/
          retention-days: 7
          if-no-files-found: warn

      - name: 🌐 Deploy Allure Report to GitHub Pages
        id: pages_deploy
        if: always() && steps.allure_generate.outputs.has_results == 'true'
        timeout-minutes: 5
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: nightly
          keep_files: true
        continue-on-error: true

      - name: 🔗 Post GitHub Pages URL to summary
        if: always() && steps.allure_generate.outputs.has_results == 'true'
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          PAGES_URL="https://${OWNER}.github.io/${REPO}/nightly/"
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Voir en ligne (recommandé)" >> $GITHUB_STEP_SUMMARY
          echo "[$PAGES_URL]($PAGES_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Rapport téléchargeable" >> $GITHUB_STEP_SUMMARY
          echo "Artifact: \`allure-report-nightly\`" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Ouvrir \`index.html\` directement donne une erreur 500." >> $GITHUB_STEP_SUMMARY
          echo "> Exécutez \`view-report.bat\` (Windows) ou \`./view-report.sh\` (Linux/Mac) inclus dans l'artifact." >> $GITHUB_STEP_SUMMARY

      - name: 📊 Upload test reports
        if: always()
        timeout-minutes: 3
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: |
            reports/
            screenshots/
          retention-days: 7
          if-no-files-found: warn

      - name: 📧 Send notification on failure
        if: failure()
        run: echo "❌ Nightly smoke tests failed! See ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Post test summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = './reports/cucumber-report.json';

            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              let passed = 0, failed = 0, skipped = 0;

              report.forEach(feature => {
                feature.elements?.forEach(scenario => {
                  scenario.steps?.forEach(step => {
                    if (step.result?.status === 'passed') passed++;
                    else if (step.result?.status === 'failed') failed++;
                    else if (step.result?.status === 'skipped') skipped++;
                  });
                });
              });

              core.summary
                .addHeading('🎯 Smoke Test Results')
                .addTable([
                  [{data: 'Status', header: true}, {data: 'Count', header: true}],
                  ['✅ Passed', String(passed)],
                  ['❌ Failed', String(failed)],
                  ['⏭️ Skipped', String(skipped)],
                ])
                .write();
            }
