name: 🌙 Nightly Smoke Tests

on:
  schedule:
    # Runs every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

env:
  HEADLESS: true
  SLOWMO_MS: '0'
  BASE_URL: ${{ secrets.BASE_URL || 'https://vanlog-express.com' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🌐 Wait for app to be ready (optional)
        run: |
          for i in {1..30}; do
            if curl -f https://vanlog-express.com 2>/dev/null; then
              echo "✅ App is ready"
              break
            fi
            echo "⏳ Waiting for app... ($i/30)"
            sleep 2
          done || echo "⚠️ App not accessible, continuing anyway"

      - name: 🧪 Run Smoke Tests (@smoke)
        run: npm run test:headless -- --tags "@smoke" --parallel 4
        continue-on-error: true

      - name: 📥 Restore Allure history from previous run
        if: always()
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          BASE="https://${OWNER}.github.io/${REPO}/nightly/history"
          mkdir -p allure-results/history
          for f in categories-trend duration-trend history-trend history retry-trend; do
            curl -sf "${BASE}/${f}.json" -o "allure-results/history/${f}.json" 2>/dev/null \
              && echo "✅ history/${f}.json restored" || true
          done
        continue-on-error: true

      - name: 📊 Generate Allure Report
        id: allure_generate
        if: always()
        run: |
          echo "📂 Checking allure-results..."
          COUNT=$(find allure-results -maxdepth 1 -name '*-result.json' 2>/dev/null | wc -l)
          echo "Found ${COUNT} result file(s)"
          if [ "$COUNT" -gt "0" ]; then
            npx allure generate allure-results --clean -o allure-report
            echo "✅ Allure report generated with ${COUNT} results"
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No test result files found — skipping report generation"
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Upload Allure Report
        if: always() && steps.allure_generate.outputs.has_results == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-nightly
          path: allure-report/
          retention-days: 7

      - name: 🌐 Deploy Allure Report to GitHub Pages
        if: always() && steps.allure_generate.outputs.has_results == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: nightly
          keep_files: true
        continue-on-error: true

      - name: 📊 Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: |
            reports/
            screenshots/
            videos/
          retention-days: 7

      - name: 📈 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 7

      - name: 📧 Send notification on failure
        if: failure()
        run: echo "❌ Nightly smoke tests failed! See ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Post test summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = './reports/cucumber-report.json';

            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              let passed = 0, failed = 0, skipped = 0;

              report.forEach(feature => {
                feature.elements?.forEach(scenario => {
                  scenario.steps?.forEach(step => {
                    if (step.result?.status === 'passed') passed++;
                    else if (step.result?.status === 'failed') failed++;
                    else if (step.result?.status === 'skipped') skipped++;
                  });
                });
              });

              core.summary
                .addHeading('🎯 Smoke Test Results')
                .addTable([
                  [{data: 'Status', header: true}, {data: 'Count', header: true}],
                  ['✅ Passed', String(passed)],
                  ['❌ Failed', String(failed)],
                  ['⏭️ Skipped', String(skipped)],
                ])
                .write();
            }
