name: 🚀 Release - Full Test Suite

on:
  schedule:
    # Runs every 2 weeks on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  # Allow manual trigger
  workflow_dispatch:

env:
  HEADLESS: true
  SLOWMO_MS: '0'
  BASE_URL: ${{ secrets.BASE_URL || 'https://vanlog-express.com' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ALLURE_RESULTS_DIR: allure-results

jobs:
  full-test-suite:
    name: Run Complete Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 300
    container:
      image: ${{ vars.DOCKERHUB_USERNAME }}/automatisation-pom:latest
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - 'smoke'      # @smoke tagged tests (critical path)
          - 'e2e'        # @e2e integration tests
          - 'admin'      # @admin-related tests
          - 'client'     # @client-related tests
          - 'all'        # All remaining tests (excludes @smoke)

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🌐 Wait for app to be ready (optional)
        timeout-minutes: 2
        continue-on-error: true
        run: |
          for i in {1..15}; do
            if curl -f --connect-timeout 5 --max-time 10 https://vanlog-express.com 2>/dev/null; then
              echo "✅ App is ready"
              exit 0
            fi
            echo "⏳ Waiting for app... ($i/15)"
            sleep 5
          done
          echo "⚠️ App not accessible after retries, continuing anyway"

      - name: 🧹 Clean allure-results
        run: rm -rf allure-results && mkdir -p allure-results

      - name: 🧪 Run Smoke Tests (@smoke)
        if: matrix.test-suite == 'smoke'
        run: npm run test:headless -- --tags "@smoke" || true

      - name: 🔄 Run E2E Tests (@e2e)
        if: matrix.test-suite == 'e2e'
        run: npm run test:e2e || true

      - name: 👨‍💼 Run Admin Tests (@admin)
        if: matrix.test-suite == 'admin'
        run: npm run test:e2e:admin || true

      - name: 👤 Run Client Tests (@client)
        if: matrix.test-suite == 'client'
        run: npm run test:e2e:client || true

      - name: 🔍 Run All Other Tests
        if: matrix.test-suite == 'all'
        run: npm run test:headless -- --tags "not @smoke" || true

      - name: 📥 Restore Allure history from previous run
        if: always() && matrix.test-suite == 'smoke'
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          BASE="https://${OWNER}.github.io/${REPO}/release/history"
          mkdir -p allure-results/history
          for f in categories-trend duration-trend history-trend history retry-trend; do
            curl -sf "${BASE}/${f}.json" -o "allure-results/history/${f}.json" 2>/dev/null \
              && echo "✅ history/${f}.json restored" || true
          done
        continue-on-error: true

      - name: 📊 Generate Allure Report (${{ matrix.test-suite }})
        id: allure_generate
        if: always()
        continue-on-error: true
        run: |
          COUNT=$(find allure-results -maxdepth 1 -name '*-result.json' 2>/dev/null | wc -l)
          echo "📂 Suite=${{ matrix.test-suite }} — ${COUNT} result file(s) found"
          if [ "$COUNT" -gt "0" ]; then
            npx allure generate allure-results --clean -o allure-report
            echo "✅ Report generated with ${COUNT} results"
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No result files — skipping report generation"
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Upload Allure Report (${{ matrix.test-suite }})
        if: always() && steps.allure_generate.outputs.has_results == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.test-suite }}
          path: allure-report/
          retention-days: 30
          if-no-files-found: warn

      - name: 📊 Upload test reports (${{ matrix.test-suite }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.test-suite }}
          path: |
            reports/
            screenshots/
            videos/
          retention-days: 30
          if-no-files-found: warn

  consolidate-results:
    name: 📋 Consolidate Results
    runs-on: ubuntu-latest
    needs: full-test-suite
    if: always()
    permissions:
      contents: write

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: 📊 Generate summary report
        run: |
          echo "# 🎯 Release Test Suite Summary" > RELEASE_SUMMARY.md
          echo "" >> RELEASE_SUMMARY.md
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> RELEASE_SUMMARY.md
          echo "**Workflow Run:** [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> RELEASE_SUMMARY.md
          echo "" >> RELEASE_SUMMARY.md
          echo "## Test Results" >> RELEASE_SUMMARY.md
          echo "- ✅ Smoke Tests (Critical Path)" >> RELEASE_SUMMARY.md
          echo "- 🔄 E2E Tests (Integration)" >> RELEASE_SUMMARY.md
          echo "- 👨‍💼 Admin Tests" >> RELEASE_SUMMARY.md
          echo "- 👤 Client Tests" >> RELEASE_SUMMARY.md
          echo "- 🔍 Full Suite" >> RELEASE_SUMMARY.md
          echo "" >> RELEASE_SUMMARY.md
          echo "## Artifacts" >> RELEASE_SUMMARY.md
          find artifacts -type f \( -name "*.json" -o -name "*.html" \) 2>/dev/null | while read file; do
            echo "- \`$file\`" >> RELEASE_SUMMARY.md
          done
          cat RELEASE_SUMMARY.md

      - name: 📤 Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: RELEASE_SUMMARY.md
          retention-days: 30

      - name: 🔔 Write release summary to job summary
        run: cat RELEASE_SUMMARY.md >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Check smoke report has real Allure data
        id: check_smoke
        run: |
          WIDGET="artifacts/allure-report-smoke/widgets/summary.json"
          if [ -f "$WIDGET" ]; then
            echo "✅ Allure smoke report contains widget data"
            echo "has_smoke_report=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No smoke widget data found — skipping GitHub Pages deploy"
            echo "has_smoke_report=false" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Add local viewing scripts to release report
        if: steps.check_smoke.outputs.has_smoke_report == 'true'
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          PAGES_URL="https://${OWNER}.github.io/${REPO}/release/"
          REPORT_DIR="artifacts/allure-report-smoke"

          cat > ${REPORT_DIR}/view-report.bat << 'BATCH'
          @echo off
          echo =============================================
          echo  Allure Report - Visualisation locale
          echo =============================================
          echo Ouvrez : http://localhost:8080
          echo Ctrl+C pour arreter.
          where python >nul 2>&1 && (python -m http.server 8080) || (npx http-server -p 8080 --cors)
          BATCH

          cat > ${REPORT_DIR}/view-report.sh << SHELL
          #!/bin/bash
          echo "Ouvrez : http://localhost:8080  |  Ctrl+C pour arreter"
          python3 -m http.server 8080 2>/dev/null || python -m http.server 8080 2>/dev/null || npx http-server -p 8080 --cors
          SHELL
          chmod +x ${REPORT_DIR}/view-report.sh

          cat > ${REPORT_DIR}/LISEZ-MOI.txt << README
          Rapport Allure - NE PAS ouvrir index.html directement (erreur 500).
          En ligne : ${PAGES_URL}
          Windows  : double-cliquez view-report.bat puis http://localhost:8080
          Linux/Mac: ./view-report.sh puis http://localhost:8080
          README

      - name: 🌐 Deploy Allure Report to GitHub Pages
        if: steps.check_smoke.outputs.has_smoke_report == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts/allure-report-smoke
          publish_branch: gh-pages
          destination_dir: release
          keep_files: true
        continue-on-error: true

      - name: 🔗 Post release report URL to summary
        if: steps.check_smoke.outputs.has_smoke_report == 'true'
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          PAGES_URL="https://${OWNER}.github.io/${REPO}/release/"
          echo "## 📊 Allure Report (Release)" >> $GITHUB_STEP_SUMMARY
          echo "[$PAGES_URL]($PAGES_URL)" >> $GITHUB_STEP_SUMMARY
          echo "> Artifact: ouvrez \`view-report.bat\` (Windows) ou \`./view-report.sh\`" >> $GITHUB_STEP_SUMMARY

  docker-build-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [full-test-suite, consolidate-results]
    if: always() && needs.full-test-suite.result != 'cancelled'

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/automatisation-pom:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/automatisation-pom:${{ github.sha }}

  notify-slack:
    name: 📢 Slack Notification
    runs-on: ubuntu-latest
    needs: [full-test-suite, consolidate-results]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: 📧 Notify Slack on Success
        if: env.SLACK_WEBHOOK_URL != '' && needs.full-test-suite.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Release Full Test Suite Completed Successfully!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Release Test Suite Completed*\n✅ All tests passed!\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: 📧 Notify Slack on Failure
        if: env.SLACK_WEBHOOK_URL != '' && needs.full-test-suite.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Release Full Test Suite Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Release Test Suite Failed*\n❌ Some tests failed!\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
