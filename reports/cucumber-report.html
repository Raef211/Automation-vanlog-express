window.CUCUMBER_MESSAGES = [{"meta":{"protocolVersion":"31.1.0","implementation":{"version":"12.7.0","name":"cucumber-js"},"cpu":{"name":"x64"},"os":{"name":"win32","version":"10.0.26200"},"runtime":{"name":"node.js","version":"24.15.0"}}},{"source":{"data":"# language: fr\r\n@add-order-form\r\nFonctionnalité: Formulaire Ajouter une commande - Remplissage complet\r\n\r\n  Contexte:\r\n    Étant donné je suis sur la page de connexion\r\n    Quand je me connecte avec le compte admin\r\n    Et je clique sur le menu item \"Liste des commandes\"\r\n    Et je clique sur le bouton \"Ajouter une commande\"\r\n\r\n  @deliver @form-open\r\n  Scénario: Ouvrir le formulaire Livrer une commande\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Alors je devrais voir le formulaire de commande actif\r\n\r\n  @deliver @required\r\n  Scénario: Vérifier les validations obligatoires du formulaire livraison\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors je devrais voir au moins une erreur de validation active\r\n\r\n  @deliver @fill-form\r\n  Scénario: Remplir complètement le formulaire livraison\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis le formulaire livraison complet\r\n    Alors le formulaire actif ne doit pas afficher d'erreur bloquante\r\n\r\n  @deliver @submit-success\r\n  Scénario: Soumettre une commande livraison\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis le formulaire livraison complet\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors la soumission devrait se terminer sans erreur bloquante\r\n\r\n  @bring @form-open\r\n  Scénario: Ouvrir le formulaire Apportez une commande\r\n    Quand je clique sur le bouton \"Apportez une commande\"\r\n    Alors je devrais voir le formulaire de commande actif\r\n\r\n  @bring @required\r\n  Scénario: Vérifier les validations obligatoires du formulaire apport\r\n    Quand je clique sur le bouton \"Apportez une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors je devrais voir au moins une erreur de validation active\r\n\r\n  @bring @fill-form\r\n  Scénario: Remplir complètement le formulaire apport\r\n    Quand je clique sur le bouton \"Apportez une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis le formulaire apport complet\r\n    Alors le formulaire actif ne doit pas afficher d'erreur bloquante\r\n\r\n  @bring @submit-success\r\n  Scénario: Soumettre une commande apport\r\n    Quand je clique sur le bouton \"Apportez une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis le formulaire apport complet\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors la soumission devrait se terminer sans erreur bloquante\r\n\r\n  @form-cancel\r\n  Scénario: Fermer le formulaire sans soumission\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Quand je ferme le formulaire actif\r\n    Alors le formulaire actif devrait être fermé\r\n\r\n  @dropdown\r\n  Scénario: Afficher les options de gouvernorat dans le formulaire\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Alors je devrais voir la liste des gouvernorats du formulaire actif\r\n    Et la liste des gouvernorats devrait contenir au moins une option\r\n\r\n  @deliver @negative\r\n  Scénario: Soumettre avec des caractères spéciaux non autorisés\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis les champs avec des caractères spéciaux non autorisés\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors je devrais voir au moins une erreur de validation active\r\n\r\n  @deliver @edgecase\r\n  Scénario: Soumettre avec des chaînes de caractères très longues\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis les champs avec des chaînes très longues du formulaire actif\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors le formulaire actif ne doit pas afficher d'erreur bloquante\r\n","uri":"features\\add-order-form.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[{"location":{"line":2,"column":1},"name":"@add-order-form","id":"492d4b3d-a4f3-4e35-8df6-a1134f00483d"}],"location":{"line":3,"column":1},"language":"fr","keyword":"Fonctionnalité","name":"Formulaire Ajouter une commande - Remplissage complet","description":"","children":[{"background":{"id":"3cf58e05-d1a0-40c1-980e-1af6d2b6e37c","location":{"line":5,"column":3},"keyword":"Contexte","name":"","description":"","steps":[{"id":"b6072d20-9258-48ff-9e52-093e283c7e0f","location":{"line":6,"column":5},"keyword":"Étant donné ","keywordType":"Context","text":"je suis sur la page de connexion"},{"id":"290ae01c-141c-4a14-bec0-a95262e983e3","location":{"line":7,"column":5},"keyword":"Quand ","keywordType":"Action","text":"je me connecte avec le compte admin"},{"id":"449ab06c-0d7b-4462-a6a3-b050c5888b47","location":{"line":8,"column":5},"keyword":"Et ","keywordType":"Conjunction","text":"je clique sur le menu item \"Liste des commandes\""},{"id":"f9e55f9b-1a4a-462c-aa7b-3730c4cd3fa3","location":{"line":9,"column":5},"keyword":"Et ","keywordType":"Conjunction","text":"je clique sur le bouton \"Ajouter une commande\""}] vec le compte admin\r\n    Alors je devrais être redirigé vers le dashboard\r\n\r\n  @dashboard @menu\r\n  Scénario: Vérifier la présence de tous les menu items\r\n    Alors je devrais voir le menu item \"Tableau de bord\"\r\n    Et je devrais voir le menu item \"Liste des commandes\"\r\n    Et je devrais voir le menu item \"Liste des transporteurs\"\r\n    Et je devrais voir le menu item \"Liste des clients\"\r\n    Et je devrais voir le menu item \"Factures\"\r\n    Et je devrais voir le menu item \"Réclamations\"\r\n    Et je devrais voir le menu item \"Suivi des commandes\"\r\n\r\n  @dashboard @menu\r\n  Scénario: Vérifier que Tableau de bord est sélectionné par défaut\r\n    Alors le menu item \"Tableau de bord\" devrait être sélectionné\r\n\r\n  @dashboard @navigation\r\n  Scénario: Naviguer vers Liste des commandes\r\n    Quand je clique sur le menu item \"Liste des commandes\"\r\n    Alors l'URL devrait contenir \"/admin/orders\"\r\n    Et le titre de la page devrait être \"Page - Liste des commandes\"\r\n    Et le menu item \"Liste des commandes\" devrait être sélectionné\r\n\r\n  @dashboard @navigation\r\n  Scénario: Naviguer vers Liste des transporteurs\r\n    Quand je clique sur le menu item \"Liste des transporteurs\"\r\n    Alors l'URL devrait contenir \"/admin/transporters\"\r\n    Et le titre de la page devrait être \"Page - Liste des transporteurs\"\r\n    Et le menu item \"Liste des transporteurs\" devrait être sélectionné\r\n\r\n  @dashboard @navigation\r\n  Scénario: Naviguer vers Liste des clients\r\n    Quand je clique sur le menu item \"Liste des clients\"\r\n    Alors l'URL devrait contenir \"/admin/providers\"\r\n    Et le titre de la page devrait être \"Page - Liste des clients\"\r\n    Et le menu item \"Liste des clients\" devrait être sélectionné\r\n\r\n  @dashboard @navigation\r\n  Scénario: Naviguer vers Factures\r\n    Quand je clique sur le menu item \"Factures\"\r\n    Alors l'URL devrait contenir \"/admin/invoices\"\r\n    Et le titre de la page devrait être \"Page - Factures\"\r\n    Et le menu item \"Factures\" devrait être sélectionné\r\n\r\n  @dashboard @navigation\r\n  Scénario: Naviguer vers Réclamations\r\n    Quand je clique sur le menu item \"Réclamations\"\r\n    Alors l'URL devrait contenir \"/admin/complaints\"\r\n    Et le titre de la page devrait être \"Page - Réclamations\"\r\n    Et le menu item \"Réclamations\" devrait être sélectionné\r\n\r\n  @dashboard @navigation\r\n  Scénario: Naviguer vers Suivi des commandes\r\n    Quand je clique sur le menu item \"Suivi des commandes\"\r\n    Alors l'URL devrait contenir \"/admin/track-orders\"\r\n    Et le titre de la page devrait être \"Page - Suivi des commandes\"\r\n    Et le menu item \"Suivi des commandes\" devrait être sélectionné\r\n\r\n  @dashboard @home\r\n  Scénario: Vérifier les éléments du Tableau de bord\r\n    Alors je devrais voir le titre \"Page - Tableau de bord\"\r\n    Et je devrais voir la carte \"Statistiques des commandes\"\r\n    Et je devrais voir la carte \"Statistiques des utilisateurs\"\r\n    Et je devrais voir le profil utilisateur \"Vanlog Express\"\r\n\r\n  @dashboard @orders\r\n  Scénario: Vérifier les éléments de Liste des commandes\r\n    Quand je clique sur le menu item \"Liste des commandes\"\r\n    Alors je devrais voir le bouton \"Ajouter une commande\"\r\n    Et je devrais voir le champ de recherche avec placeholder \"Chercher avec numéro de suivi\"\r\n    Et je devrais voir un tableau avec les colonnes \"Numéro de suivi, Date de création, Statut\"\r\n\r\n  @dashboard @transporters\r\n  Scénario: Vérifier les éléments de Liste des transporteurs\r\n    Quand je clique sur le menu item \"Liste des transporteurs\"\r\n    Alors je devrais voir le champ de recherche avec placeholder \"Chercher avec email\"\r\n    Et je devrais voir un tableau avec les colonnes \"Nom de livreur, Date d'inscription, Action\"\r\n\r\n  @dashboard @clients\r\n  Scénario: Vérifier les éléments de Liste des clients\r\n    Quand je clique sur le menu item \"Liste des clients\"\r\n    Alors je devrais voir le champ de recherche avec placeholder \"Chercher avec email\"\r\n    Et je devrais voir un tableau avec les colonnes \"Nom du client, Date d'inscription, Actions\"\r\n\r\n  @dashboard @invoices\r\n  Scénario: Vérifier les éléments de Factures\r\n    Quand je clique sur le menu item \"Factures\"\r\n    Alors je devrais voir le titre \"Générer des factures de  l'entreprise\"\r\n    Et je devrais voir le bouton \"Générer la Facture\"\r\n    Et je devrais voir le champ \"Date de début\"\r\n    Et je devrais voir le champ \"Date de fin\"\r\n\r\n  @dashboard @complaints\r\n  Scénario: Vérifier les éléments de Réclamations\r\n    Quand je clique sur le menu item \"Réclamations\"\r\n    Alors je devrais voir le champ de recherche avec placeholder \"Rechercher par sujet\"\r\n\r\n  @dashboard @tracking\r\n  Scénario: Vérifier les éléments de Suivi des commandes\r\n    Quand je clique sur le menu item \"Suivi des commandes\"\r\n    Alors je devrais voir le titre \"Suivez votre commande\"\r\n    Et je devrais voir le champ avec id \"trackingNumber\"\r\n    Et je devrais voir le bouton \"Confirmer\"\r\n\r\n  @dashboard @logout\r\n  Scénario: Vérifier le bouton de déconnexion\r\n    Alors je devrais voir le bouton \"Déconnexion\"\r\n","uri":"features\\dashboard.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":2,"column":1},"language":"fr","keyword":"Fonctionnalité","name":"Dashboard Admin - Navigation et Sections","description":"","children":[{"background":{"id":"20a89a95-ff9c-4cca-a385-7a6322829671","location":{"line":4,"column":3},"keyword":"Contexte","name":"","description":"","steps":[{"id":"927cb325-6932-41fd-910a-5ea91b42913e","location":{"line":5,"column":5},"keyword":"Étant donné que ","keywordType":"Context","text":"je suis sur la page de connexion"},{"id":"876119c5-ffaf-4b6a-9a3f-7b06d9669391","location":{"line":6,"column" the navigation bar","type":"Action","astNodeIds":["50498910-9b04-40af-9707-e9d469427819"]},{"id":"baf701b9-9bd8-49bb-95ca-7a62e79bcfe5","text":"I should see the \"Suivi des commandes\" button in the navigation bar","type":"Outcome","astNodeIds":["6bc9375e-3b69-43bc-844f-5d14171fe3be"]},{"id":"6e02efe7-60f0-4d67-a29f-8075fc54aeae","text":"I should see the \"Se Connecter\" button in the navigation bar","type":"Outcome","astNodeIds":["1811731c-68ef-4e1e-b786-699dbf1b80b4"]},{"id":"2a6ba7ab-05ec-4f67-8a13-c5d3fa94458e","text":"I should see the \"S'inscrire\" button in the navigation bar","type":"Outcome","astNodeIds":["204f6667-04bb-4528-b044-00a7c306b5ed"]}]}},{"source":{"data":"# language: fr\r\nFonctionnalité: Tests de scénarios négatifs et positifs pour l'ajout de commande\r\n\r\n  Contexte:\r\n    Étant donné je suis sur la page de connexion\r\n    Quand je me connecte avec le compte admin\r\n    Et je clique sur le menu item \"Liste des commandes\"\r\n    Et je clique sur le bouton \"Ajouter une commande\"\r\n\r\n  @negative @empty-form\r\n  Scénario: Soumettre un formulaire vide sans saisir les champs obligatoires\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors je devrais voir au moins une erreur de validation active\r\n    Et les erreurs de validation doivent contenir les champs obligatoires\r\n\r\n  @negative @partial-form\r\n  Scénario: Remplir partiellement le formulaire et soumettre\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis le formulaire avec des données partielles\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors je devrais voir au moins une erreur de validation active\r\n\r\n  @negative @invalid-phone\r\n  Scénario: Soumettre avec un numéro de téléphone invalide\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis les champs texte avec \"TestUser\"\r\n    Et je remplis les champs numérique avec des données invalides\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors je devrais voir au moins une erreur de validation\r\n\r\n  @negative @special-characters\r\n  Scénario: Soumettre avec des caractères spéciaux non autorisés\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis le formulaire avec des caractères spéciaux\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors je devrais voir une erreur de validation ou de paramètre invalide\r\n\r\n  @negative @form-browser-close\r\n  Scénario: Fermer le navigateur pendant la saisie du formulaire\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Alors le formulaire ne doit pas avoir d'erreur de connexion navigateur\r\n    Et je devrais pouvoir continuer à interagir avec le formulaire\r\n\r\n  @negative @long-input\r\n  Scénario: Soumettre avec des chaînes de caractères très longues\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis les champs avec des chaînes très longues\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors le formulaire devrait gérer les longues chaînes correctement\r\n\r\n  @positive @complete-flow\r\n  Scénario: Flux complet de création d'une commande \"Livrer\"\r\n    Quand je clique sur le bouton \"Livrer une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis le formulaire livraison complet\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors la soumission devrait se terminer sans erreur bloquante\r\n\r\n  @positive @complete-flow-apport\r\n  Scénario: Flux complet de création d'une commande \"Apportez\"\r\n    Quand je clique sur le bouton \"Apportez une commande\"\r\n    Et j'attends que le formulaire de commande actif soit prêt\r\n    Et je remplis le formulaire apport complet\r\n    Et je clique sur le bouton soumettre du formulaire actif\r\n    Alors la soumission devrait se terminer sans erreur bloquante\r\n","uri":"features\\negative-scenarios.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":2,"column":1},"language":"fr","keyword":"Fonctionnalité","name":"Tests de scénarios négatifs et positifs pour l'ajout de commande","description":"","children":[{"background":{"id":"aad779bd-24e9-46c6-95c3-1d35566028d3","location":{"line":4,"column":3},"keyword":"Contexte","name":"","description":"","steps":[{"id":"a4364cd2-6758-4ed7-a867-06e684e8f9a1","location":{"line":5,"column":5},"keyword":"Étant donné ","keywordType":"Context","text":"je suis sur la page de connexion"},{"id":"28a4e6e4-ae73-4c4d-955f-abe09958cf6d","location":{"line":6,"column":5},"keyword":"Quand ","keywordType":"Action","text":"je me connecte avec le compte admin"},{"id":"71ce4dcb-64a5-42c7-bb0f-b97866244a5b","location":{"line":7,"column":5},"keyword":"Et ","keywordType":"Conjunction","text":"je clique sur le menu item \"Liste des commandes\""},{"id":"959e8f12-03a3-4034-9261-b9af9cee4ae3","location":{"line":8,"column":5},"keyword":"Et ","keywordType":"Conjunction","text":"je clique sur le bouton \"Ajouter une commande\""}]}},{"scenario":{"id":"9c90164e-3c81-4b8a-82bc-fe844e58d803","tags":[{"location":{"line":10,"column":3},"name":"@negative","id":"301de2e8-8e77-4d5f-bd57-703519579ce4"},{"location":{"line":10,"column":13},"name":"@empty-form","id":"f2f16b6c-320c-41f9-939e-012effa1d242"}],"location":{"line":11,"column":3},"keyword":"Scénario","name":"Soumettre un formulaire vide sans saisir les cham n transit\"\r\n    Et je devrais voir l'option \"Livré\"\r\n    Et je devrais voir l'option \"Annulé\"\r\n\r\n  @orders @table\r\n  Scénario: Vérifier les colonnes du tableau\r\n    Alors le tableau devrait avoir les colonnes \"Numéro de suivi, Date de création, Nom du destinataire, Statut\"\r\n\r\n  @orders @pagination\r\n  Scénario: Vérifier la pagination\r\n    Alors la pagination devrait être visible\r\n    Et la pagination devrait afficher le nombre total de commandes\r\n\r\n  @orders @count\r\n  Scénario: Vérifier le compteur de commandes\r\n    Alors je devrais voir le texte \"Nombre total des commandes\"\r\n    Et le compteur devrait afficher le nombre de commandes\r\n\r\n","uri":"features\\orders-management.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":2,"column":1},"language":"fr","keyword":"Fonctionnalité","name":"Dashboard Admin - Gestion des Commandes","description":"","children":[{"background":{"id":"fb652224-456a-4ff0-a4ed-39ab025f75c9","location":{"line":4,"column":3},"keyword":"Contexte","name":"","description":"","steps":[{"id":"8696130e-2416-4034-ae75-755371b78366","location":{"line":5,"column":5},"keyword":"Étant donné ","keywordType":"Context","text":"je suis sur la page de connexion"},{"id":"02d3db59-158e-4fb8-988e-f93319cf2c59","location":{"line":6,"column":5},"keyword":"Quand ","keywordType":"Action","text":"je me connecte avec le compte admin"},{"id":"e4cbd4bc-6dd6-4e93-979c-7c2514aa69be","location":{"line":7,"column":5},"keyword":"Et ","keywordType":"Conjunction","text":"je clique sur le menu item \"Liste des commandes\""},{"id":"dafbc5e0-beec-4d15-a4c3-b1646c2c049d","location":{"line":8,"column":5},"keyword":"Alors ","keywordType":"Outcome","text":"l'URL devrait contenir \"/admin/orders\""}]}},{"scenario":{"id":"bdc2586d-62e8-471e-84b4-d2323a0175fa","tags":[{"location":{"line":10,"column":3},"name":"@orders","id":"a4fcb234-1844-4040-b54d-6737d4208435"},{"location":{"line"
