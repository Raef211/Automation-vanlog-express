version: '3.8'

# Configuration Docker Compose pour le développement local
# Utilisation: docker-compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up

services:
  playwright:
    # Monter le volume de node_modules localement pour hot-reload
    volumes:
      - ..:/app
      - /app/node_modules
    # Mode interactif pour le développement
    stdin_open: true
    tty: true
    # Exécuter en mode headed par défaut
    environment:
      HEADLESS: "false"
      SLOWMO_MS: "100"
    command: npm run test:headed

  newman:
    profiles:
      - postman
    volumes:
      - ..:/app
      - /app/node_modules
    environment:
      NEWMAN_BASE_URL: http://app:3000

  # Service pour le débogage et développement
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: playwright-dev
    volumes:
      - ..:/app
      - /app/node_modules
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      HEADLESS: "false"
      SLOWMO_MS: "100"
      NODE_ENV: development
    networks:
      - test-network
    command: /bin/bash
    profiles:
      - dev
